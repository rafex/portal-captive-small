[server]
http_port = 8080

[session]
internet_ttl_seconds = 3600

[repository]
type = "mqtt_rust"
sqlite_db_path = "data/auth-service.db"
users_ttl_seconds = 3600

[db_mqtt]
user_request_topic = "portal/db/user/request"
response_wait_seconds = 5
max_retries = 2
retry_backoff_ms = 100

[fields.name]
type = "string"
min_length = 2
max_length = 120

[fields.lastname]
type = "string"
min_length = 2
max_length = 120

[fields.email]
type = "email"
required = false

[fields.password]
type = "password"
min_length = 6

[fields.room]
type = "string"
min_length = 1
max_length = 20

[fields.social]
type = "social"
providers = ["facebook", "instagram", "tiktok", "x"]

[fields.terms]
type = "checkbox"


[i18n.es_MX.fields.name]
label = "Nombre"
placeholder = "Ingresa tu nombre"

[i18n.es_MX.fields.lastname]
label = "Apellidos"
placeholder = "Ingresa tus apellidos"

[i18n.es_MX.fields.email]
label = "Correo electrónico"
placeholder = "correo@ejemplo.com"

[i18n.es_MX.fields.password]
label = "Contraseña"
placeholder = "********"

[i18n.es_MX.fields.room]
label = "Habitación"
placeholder = "101"

[i18n.es_MX.fields.social]
label = "Red social"

[i18n.es_MX.fields.terms]
label = "Acepto términos y condiciones"

[i18n.es_MX.messages]
welcome = "Bienvenido al WiFi"
login_button = "Conectarse"

[i18n.en_US.fields.name]
label = "First Name"
placeholder = "Enter your first name"

[i18n.en_US.fields.lastname]
label = "Last Name"
placeholder = "Enter your last name"

[i18n.en_US.fields.email]
label = "Email"
placeholder = "email@example.com"

[i18n.en_US.fields.password]
label = "Password"
placeholder = "********"

[i18n.en_US.fields.room]
label = "Room"
placeholder = "101"

[i18n.en_US.fields.social]
label = "Social Network"

[i18n.en_US.fields.terms]
label = "I accept terms and conditions"

[i18n.en_US.messages]
welcome = "Welcome to WiFi"
login_button = "Connect"

[i18n.fr_FR.fields.name]
label = "Prénom"
placeholder = "Entrez votre prénom"

[i18n.fr_FR.fields.lastname]
label = "Nom"
placeholder = "Entrez votre nom"

[i18n.fr_FR.fields.email]
label = "Courriel"
placeholder = "courriel@exemple.fr"

[i18n.fr_FR.fields.password]
label = "Mot de passe"
placeholder = "********"

[i18n.fr_FR.fields.room]
label = "Chambre"
placeholder = "101"

[i18n.fr_FR.fields.social]
label = "Réseau social"

[i18n.fr_FR.fields.terms]
label = "J'accepte les conditions"

[i18n.fr_FR.messages]
welcome = "Bienvenue au WiFi"
login_button = "Se connecter"

