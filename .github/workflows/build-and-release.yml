name: build-and-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend/javascripts/portal
          npm ci --no-audit --no-fund
          npm run build

      - name: Package frontend
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          tar -czf "dist/frontend-${VERSION}.tar.gz" -C frontend/javascripts/portal dist
          (cd dist && sha256sum "frontend-${VERSION}.tar.gz" > "frontend-${VERSION}.tar.gz.sha256")
          tar -czf "dist/frontend-id-build-${VERSION}.tar.gz" -C frontend/javascripts/portal dist
          (cd dist && sha256sum "frontend-id-build-${VERSION}.tar.gz" > "frontend-id-build-${VERSION}.tar.gz.sha256")
          (cd frontend/javascripts/portal && zip -rq "../../../dist/frontend-id-build-${VERSION}.zip" dist)
          (cd dist && sha256sum "frontend-id-build-${VERSION}.zip" > "frontend-id-build-${VERSION}.zip.sha256")

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-artifacts
          path: dist/*

  build-backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (GraalVM 25)
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '25'

      - name: Ensure native-image is available
        run: |
          if ! command -v native-image >/dev/null 2>&1; then
            gu install native-image
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 mosquitto mosquitto-clients debootstrap

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Build Java fat-jar + native binary (GraalVM)
        run: |
          cd backend/java/portal
          mvn -q -pl services/auth-service -am -DskipTests package native:compile

      - name: Build Rust worker (native arch)
        run: |
          cd backend/rust/database-conector-sqlite
          cargo build --release

      - name: Package backend artifacts (${{ matrix.arch }})
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/package/backend/bin dist/package/backend/java dist/package/backend/config dist/package/scripts/runtime
          FAT_JAR="$(ls backend/java/portal/services/auth-service/target/auth-service-*.jar | head -n1)"
          cp backend/java/portal/services/auth-service/target/auth-service dist/package/backend/bin/auth-service-${{ matrix.arch }}
          cp "${FAT_JAR}" "dist/auth-service-fat-${VERSION}-${{ matrix.arch }}.jar"
          cp backend/rust/database-conector-sqlite/target/release/db-mqtt-worker dist/package/backend/bin/db-mqtt-worker-${{ matrix.arch }}
          cp backend/rust/database-conector-sqlite/target/release/db-mqtt-worker dist/db-mqtt-worker-${VERSION}-${{ matrix.arch }}
          cp config/portal-config.toml dist/package/backend/config/
          cp scripts/install/script-install.sh dist/
          cp scripts/install/rpi3b-direct-install.sh dist/
          cp scripts/install/rpi3b-lxc-install.sh dist/
          cp scripts/install/rpi3b-prepare-lxc.sh dist/
          cp scripts/runtime/start-services.sh dist/package/scripts/runtime/start-services.sh
          tar -czf "dist/backend-${VERSION}-${{ matrix.arch }}.tar.gz" -C dist/package backend scripts
          (cd dist && sha256sum "auth-service-fat-${VERSION}-${{ matrix.arch }}.jar" > "auth-service-fat-${VERSION}-${{ matrix.arch }}.jar.sha256")
          (cd dist && sha256sum "db-mqtt-worker-${VERSION}-${{ matrix.arch }}" > "db-mqtt-worker-${VERSION}-${{ matrix.arch }}.sha256")
          (cd dist && sha256sum "backend-${VERSION}-${{ matrix.arch }}.tar.gz" > "backend-${VERSION}-${{ matrix.arch }}.tar.gz.sha256")

      - name: Build LXC image artifact (arm64 only)
        if: matrix.arch == 'arm64'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMG_DIR="dist/lxc-image/portal-captive"
          ROOTFS_DIR="${IMG_DIR}/rootfs"

          mkdir -p "${ROOTFS_DIR}"
          sudo debootstrap --arch=arm64 --variant=minbase --include=systemd-sysv bookworm "${ROOTFS_DIR}" http://deb.debian.org/debian
          # Ensure init exists as LXC entrypoint.
          sudo test -x "${ROOTFS_DIR}/sbin/init"
          # Preinstall runtime deps to avoid apt network dependency during Raspi install.
          sudo chroot "${ROOTFS_DIR}" /bin/bash -lc "apt-get update && apt-get install -y --no-install-recommends mosquitto mosquitto-clients sqlite3 curl python3 ca-certificates procps iproute2 && apt-get clean && rm -rf /var/lib/apt/lists/*"

          sudo mkdir -p "${ROOTFS_DIR}/opt/portal-captive-small"
          sudo cp -a dist/package/backend "${ROOTFS_DIR}/opt/portal-captive-small/"
          sudo mkdir -p "${ROOTFS_DIR}/opt/portal-captive-small/scripts/runtime"
          sudo cp scripts/runtime/start-services.sh "${ROOTFS_DIR}/opt/portal-captive-small/scripts/runtime/start-services.sh"
          sudo chmod +x "${ROOTFS_DIR}/opt/portal-captive-small/scripts/runtime/start-services.sh"
          sudo mkdir -p "${ROOTFS_DIR}/opt/portal-captive-small/data"

          sudo cp containers/lxc/portal-captive.conf "${IMG_DIR}/config"
          sudo chown -R "$(id -u):$(id -g)" dist/lxc-image

          tar -czf "dist/lxc-image-${VERSION}-arm64.tar.gz" -C dist/lxc-image portal-captive
          (cd dist && sha256sum "lxc-image-${VERSION}-arm64.tar.gz" > "lxc-image-${VERSION}-arm64.tar.gz.sha256")
          rm -rf dist/lxc-image

      - name: Upload backend artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-artifacts-${{ matrix.arch }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-frontend
      - build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-release-artifacts
          path: dist

      - name: Download backend artifacts (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: backend-release-artifacts-x86_64
          path: dist

      - name: Download backend artifacts (arm64)
        uses: actions/download-artifact@v4
        with:
          name: backend-release-artifacts-arm64
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
