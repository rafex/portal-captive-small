# ============================================================
# templates-config.toml
# Responsabilidad: definición de campos, fuentes, traducciones
# y registro de plantillas disponibles.
# Referenciado desde portal-config.toml via [templates_config].
# ============================================================

# ----------------------------------------------------------
# Campos disponibles para los formularios de registro
# ----------------------------------------------------------

[fields.name]
type = "string"
min_length = 2
max_length = 120

[fields.lastname]
type = "string"
min_length = 2
max_length = 120

[fields.email]
type = "email"
required = false

[fields.password]
type = "password"
min_length = 6

[fields.room]
type = "string"
min_length = 1
max_length = 20

[fields.social]
type = "social"
providers = ["facebook", "instagram", "tiktok", "x"]

[fields.terms]
type = "checkbox"

[fields.nickname]
type = "string"
min_length = 2
max_length = 50

# ----------------------------------------------------------
# Fuentes disponibles para las plantillas
# ----------------------------------------------------------

[fonts]
available = [
  "Inter",
  "Roboto",
  "Open Sans",
  "Lato",
  "Montserrat",
  "Poppins",
  "Nunito",
  "Source Sans Pro",
  "Raleway",
  "Ubuntu"
]
default = "Inter"

# ----------------------------------------------------------
# Registro de plantillas
# ----------------------------------------------------------

[templates]
# Directorio base donde se encuentran los ficheros de plantilla individuales.
# Cada fichero define una sección [template] con su propia paleta, fuente y campos.
directory = "config/templates"
available = [
  "hotel",
  "restaurant",
  "school",
  "coworking",
  "cafe",
  "airport",
  "mall",
  "library",
  "hospital",
  "gym",
  "event",
  "community_mesh",
  "university",
  "gaming"
]

# ----------------------------------------------------------
# Internacionalización (i18n)
# ----------------------------------------------------------

