[server]
http_port = 8080

[session]
internet_ttl_seconds = 3600

[repository]
type = "mqtt_rust"
sqlite_db_path = "data/auth-service.db"

[db_mqtt]
user_request_topic = "portal/db/user/request"
response_wait_seconds = 5
max_retries = 2
retry_backoff_ms = 100

[registration]
templates_enabled = ["hotel", "restaurante", "escuela", "casa", "personalizado"]
fields_enabled = [
  "nombres",
  "apellidos",
  "edad",
  "correo_electronico",
  "telefono",
  "celular",
  "direccion",
  "facebook",
  "instagram",
  "tiktok",
  "x",
  "contrasena"
]

[meta]
version = "1.0"
default_lang = "es_MX"
supported_langs = ["es_MX", "en_US", "fr_FR"]

[branding]
logo = "/assets/logo.png"
background = "/assets/bg.jpg"
primary_color = "#0095ff"

[fields.name]
type = "string"
required = false
min_length = 2
max_length = 120

[fields.lastname]
type = "string"
required = false
min_length = 2
max_length = 120

[fields.email]
type = "email"
required = false

[fields.password]
type = "password"
required = false
min_length = 6

[fields.room]
type = "string"
required = false
min_length = 1
max_length = 20

[fields.social]
type = "social"
required = false
providers = ["facebook", "instagram", "tiktok", "x"]

[fields.terms]
type = "checkbox"
required = false

[i18n.es_MX.fields.name]
label = "Nombre"
placeholder = "Ingresa tu nombre"

[i18n.es_MX.fields.lastname]
label = "Apellidos"
placeholder = "Ingresa tus apellidos"

[i18n.es_MX.fields.email]
label = "Correo electrónico"
placeholder = "correo@ejemplo.com"

[i18n.es_MX.fields.password]
label = "Contraseña"
placeholder = "********"

[i18n.es_MX.fields.room]
label = "Habitación"
placeholder = "101"

[i18n.es_MX.fields.social]
label = "Red social"

[i18n.es_MX.fields.terms]
label = "Acepto términos y condiciones"

[i18n.es_MX.messages]
welcome = "Bienvenido al WiFi"
login_button = "Conectarse"

[i18n.en_US.fields.name]
label = "First Name"
placeholder = "Enter your first name"

[i18n.en_US.fields.lastname]
label = "Last Name"
placeholder = "Enter your last name"

[i18n.en_US.fields.email]
label = "Email"
placeholder = "email@example.com"

[i18n.en_US.fields.password]
label = "Password"
placeholder = "********"

[i18n.en_US.fields.room]
label = "Room"
placeholder = "101"

[i18n.en_US.fields.social]
label = "Social Network"

[i18n.en_US.fields.terms]
label = "I accept terms and conditions"

[i18n.en_US.messages]
welcome = "Welcome to WiFi"
login_button = "Connect"

[i18n.fr_FR.fields.name]
label = "Prénom"
placeholder = "Entrez votre prénom"

[i18n.fr_FR.fields.lastname]
label = "Nom"
placeholder = "Entrez votre nom"

[i18n.fr_FR.fields.email]
label = "Courriel"
placeholder = "courriel@exemple.fr"

[i18n.fr_FR.fields.password]
label = "Mot de passe"
placeholder = "********"

[i18n.fr_FR.fields.room]
label = "Chambre"
placeholder = "101"

[i18n.fr_FR.fields.social]
label = "Réseau social"

[i18n.fr_FR.fields.terms]
label = "J'accepte les conditions"

[i18n.fr_FR.messages]
welcome = "Bienvenue au WiFi"
login_button = "Se connecter"

[templates.hotel]
title = "Hotel WiFi"
fields_enabled = [
  ["name", "required"],
  ["lastname", "required"],
  ["email", "required"],
  ["room", "required"],
  ["social", "optional"],
  ["terms", "required"]
]

[templates.restaurant]
title = "Restaurant WiFi"
fields_enabled = [
  ["name", "optional"],
  ["email", "required"],
  ["social", "optional"],
  ["terms", "required"]
]

[templates.school]
title = "Campus WiFi"
fields_enabled = [
  ["name", "required"],
  ["lastname", "required"],
  ["email", "required"],
  ["password", "required"],
  ["terms", "required"]
]

[login]
allow_email = true
allow_phone = true
require_password = true

[mqtt]
host = "127.0.0.1"
port = 1883
topic_register = "portal/register/in"
topic_login = "portal/login/in"
topic_issue_password = "portal/password/issue/in"
topic_register_out = "portal/register/out"
topic_login_out = "portal/login/out"
topic_issue_password_out = "portal/password/issue/out"

[smtp]
enabled = true
host = "smtp.example.com"
port = 587
username = "user@example.com"
from = "no-reply@example.com"
use_starttls = true

[openwrt]
enabled = false
ssh_host = "192.168.1.1"
ssh_port = 22
ssh_user = "root"
uci_firewall_zone = "lan"
